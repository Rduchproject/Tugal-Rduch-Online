<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro Panel 10x10</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  background:#0b0b0b;
}

/* WYŚWIETLACZ */
.left{
  flex:2;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  padding:25px;
}

.frame{
  width:88%;
  height:88%;
  border:18px solid #e6e2d6;
  background:#000;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}

/* GWIAZDKI */
.corner{
  position:absolute;
  font-size:60px;
  color:#FF5C14;
  font-family:Arial;
}
.tl{top:0;left:0;}
.tr{top:0;right:0;}
.bl{bottom:0;left:0;}
.br{bottom:0;right:0;}

/* 🔢 NUMER (RETRO) */
.verse-number{
  position:absolute;
  top:10px;
  left:15px;

  font-family:'Press Start 2P', monospace;
  font-size:20px;
  color:#FF5C14;

  text-shadow:2px 2px 0 #000;
}

/* 🔥 10x10 RETRO DISPLAY */
.display{
  width:100%;
  height:100%;
  display:grid;
  grid-template-rows:repeat(10, 1fr);
  padding:10px;
  box-sizing:border-box;

  font-family:'Press Start 2P', monospace;
  font-size:18px;
  color:#FF5C14;
}

/* linie */
.line{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:pre;
}

/* PRAWA STRONA (STEROWNIK - ARIAL) */
.right{
  flex:1;
  background:#1a1a1a;
  border-left:3px solid #333;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;

  font-family:Arial;
}

/* INPUT */
textarea{
  height:120px;
  background:#001a08;
  border:2px solid #00ff66;
  color:#00ff66;
  padding:10px;
  font-family:Arial;
}

/* 🔥 KLAVISZE RETRO */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

/* PIXEL FONT TYLKO NA KLAWISZACH + WYŚWIETLACZU */
button{
  padding:14px;
  font-size:14px;
  background:#2b2b2b;
  color:white;
  border:2px solid #555;
  cursor:pointer;

  font-family:'Press Start 2P', monospace;
}

button:active{
  transform:scale(0.95);
}

/* NAWIGACJA */
.nav{
  grid-column:span 3;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.big{
  grid-column:span 3;
  font-family:Arial;
}
</style>
</head>

<body>

<div class="left">
  <div class="frame">

    <div class="corner tl">*</div>
    <div class="corner tr">*</div>
    <div class="corner bl">*</div>
    <div class="corner br">*</div>

    <div class="verse-number" id="verseNumber"></div>
    <div class="display" id="display"></div>

  </div>
</div>

<div class="right">

  <textarea id="input" placeholder="Wklej pieśń..."></textarea>

  <div class="keypad">

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>

    <button onclick="press('0')">0</button>
    <button onclick="generate()">OK</button>
    <button onclick="clearAll()">CLR</button>

    <div class="nav">
      <button onclick="prev()">*</button>
      <button onclick="next()">#</button>
    </div>

  </div>

</div>

<script>
let verses=[];
let index=0;

const corners=document.querySelectorAll('.corner');
const verseNumber=document.getElementById("verseNumber");

function setCorners(show){
  corners.forEach(c=>c.style.opacity=show?"1":"0");
}

function generate(){
  verses=document.getElementById("input").value
    .split(/\n\s*\n/)
    .map(v=>v.trim())
    .filter(v=>v);

  index=0;
  render();
}

function extractNumber(t){
  const m=t.match(/^(\d+)\.?/);
  return m?m[1]+".":"";
}

function render(){
  const d=document.getElementById("display");

  if(!verses.length){
    d.innerHTML="";
    verseNumber.textContent="";
    setCorners(true);
    return;
  }

  const v=verses[index];

  setCorners(false);

  verseNumber.textContent=extractNumber(v);

  let text=v.replace(/^(\d+)\.?/,"").trim();

  let lines=text.split("\n").slice(0,10);

  while(lines.length<10){
    lines.push("");
  }

  d.innerHTML=lines
    .map(l=>`<div class="line">${l}</div>`)
    .join("");
}

function press(v){
  console.log(v);
}

function next(){
  if(index<verses.length-1){index++;render();}
}

function prev(){
  if(index>0){index--;render();}
}

function clearAll(){
  document.getElementById("input").value="";
  document.getElementById("display").innerHTML="";
  verseNumber.textContent="";
  verses=[];index=0;
  setCorners(true);
}

setCorners(true);
</script>

</body>
</html>
